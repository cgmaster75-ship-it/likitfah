<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ปฏิทินจีน ฤกษ์มงคล & เลขนำโชค (Chinese Lunar Calendar) | ลิขิตฟ้า</title>
    <meta name="description" content="Likit Fah Chinese Calendar ปฏิทินจันทรคติจีน ตรวจสอบฤกษ์มงคลล่วงหน้า 5 ปี พร้อมเลขนำโชคจากศาสตร์โป๊ยหยีสี่เถียว">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --navy-dark: #02040F; --gold-primary: #D4AF37; --gold-soft: #F3E5AB; --red-chinese: #C1121F;
        }
        body { 
            background-color: var(--navy-dark);
            background-image: radial-gradient(circle at 50% 0%, rgba(193, 18, 31, 0.08) 0%, transparent 50%), url('https://www.transparenttextures.com/patterns/stardust.png');
            color: #e2e8f0; font-family: 'Prompt', sans-serif; overflow-x: hidden;
        }
        .gold-gradient-text { background: linear-gradient(to right, var(--gold-soft), var(--gold-primary), #996515); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .chinese-card {
            background: linear-gradient(135deg, #111827 0%, #030712 100%);
            border: 1px solid rgba(193, 18, 31, 0.3); border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 2px 15px rgba(193, 18, 31, 0.05);
            position: relative; overflow: hidden; transition: all 0.3s ease;
        }
        .chinese-card:hover {
            border-color: rgba(212, 175, 55, 0.6); box-shadow: 0 15px 40px rgba(0,0,0,0.9), 0 0 20px rgba(212, 175, 55, 0.15); transform: translateY(-5px);
        }
        .auspicious-badge {
            background: linear-gradient(to right, var(--red-chinese), #780000); color: #fff; font-size: 0.6rem; font-weight: 800; padding: 4px 12px;
            border-radius: 12px; letter-spacing: 1px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
        }
        .day-box { background: linear-gradient(180deg, #1f2937 0%, #0f172a 100%); border: 1px solid rgba(255,255,255,0.05); }
        select option { background-color: #050A1F; color: #fff; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .chinese-pattern { background-image: url('data:image/svg+xml;utf8,<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><path d="M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H22v20h-2V22H0v-2h20z" fill="rgba(193,18,31,0.03)" fill-rule="evenodd"/></svg>'); }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-12">

    <nav class="p-4 md:p-6 flex justify-end items-center max-w-7xl mx-auto w-full relative z-20">
        <div class="flex items-center gap-3 bg-black/40 px-4 py-2 rounded-full border border-red-chinese/50 backdrop-blur-md">
            <i class="fa-solid fa-yin-yang text-red-500 text-xs"></i>
            <span class="text-[10px] font-bold text-red-400 tracking-widest uppercase">Chinese Astrology</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto w-full px-4 mt-6 md:mt-10 relative z-10 flex-grow">
        <div class="text-center mb-10 animate-float">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full border-2 border-red-500/50 bg-black/60 shadow-[0_0_30px_rgba(193,18,31,0.3)] mb-6">
                <i class="fa-solid fa-dragon text-4xl text-red-500"></i>
            </div>
            <h1 class="text-3xl md:text-5xl font-black font-serif gold-gradient-text tracking-widest uppercase mb-4 drop-shadow-[0_5px_15px_rgba(0,0,0,0.8)]">CHINESE CALENDAR</h1>
            <p class="text-slate-400 text-sm md:text-base max-w-2xl mx-auto leading-relaxed font-light">ตรวจสอบฤกษ์มงคล พลังงานจันทรคติ และเลขนำโชคประจำวันล่วงหน้า 5 ปี<br>ผสานศาสตร์โป๊ยหยีสี่เถียวเข้ากับสถิติ 36 ปี เอกสิทธิ์เฉพาะ ลิขิตฟ้า</p>
        </div>

        <div class="flex flex-col md:flex-row justify-center gap-4 mb-10">
            <select id="month-selector" onchange="renderChineseCalendar()" class="appearance-none bg-black/60 text-gold-primary border border-red-chinese/40 rounded-full px-8 py-3 text-sm font-bold outline-none focus:border-gold-primary backdrop-blur-md cursor-pointer hover:bg-red-chinese/10 transition-all text-center">
                <option value="1">มกราคม</option>
                <option value="2">กุมภาพันธ์</option>
                <option value="3">มีนาคม</option>
                <option value="4">เมษายน</option>
                <option value="5" selected>พฤษภาคม</option>
                <option value="6">มิถุนายน</option>
                <option value="7">กรกฎาคม</option>
                <option value="8">สิงหาคม</option>
                <option value="9">กันยายน</option>
                <option value="10">ตุลาคม</option>
                <option value="11">พฤศจิกายน</option>
                <option value="12">ธันวาคม</option>
            </select>

            <select id="year-selector" onchange="renderChineseCalendar()" class="appearance-none bg-black/60 text-gold-primary border border-red-chinese/40 rounded-full px-8 py-3 text-sm font-bold outline-none focus:border-gold-primary backdrop-blur-md cursor-pointer hover:bg-red-chinese/10 transition-all text-center">
                <option value="2026" selected>ปี 2026 (มะเมีย)</option>
                <option value="2027">ปี 2027 (มะแม)</option>
                <option value="2028">ปี 2028 (วอก)</option>
                <option value="2029">ปี 2029 (ระกา)</option>
                <option value="2030">ปี 2030 (จอ)</option>
                <option value="2031">ปี 2031 (กุน)</option>
            </select>
        </div>

        <div id="chinese-calendar-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <div id="likitfah-footer" class="mt-10"></div>

    <script>
        async function renderChineseCalendar() {
            const grid = document.getElementById('chinese-calendar-grid');
            const selectedMonth = document.getElementById('month-selector').value;
            const selectedYear = document.getElementById('year-selector').value;
            
            grid.innerHTML = '<div class="col-span-full text-center py-10 text-gold-primary"><i class="fa-solid fa-yin-yang fa-spin text-4xl mb-4"></i><p class="tracking-widest animate-pulse">กำลังคำนวณพลังธาตุและดึงสถิติ 36 ปี...</p></div>';

            try {
                // 📍 ยิง API พร้อมส่ง ปี และ เดือน ไปประมวลผล
                const response = await fetch(`/api/v1/chinese-calendar?year=${selectedYear}&month=${selectedMonth}`);
                if (!response.ok) throw new Error('API Failed');
                
                const data = await response.json();
                let html = '';

                data.forEach((item) => {
                    let numsHtml = item.luckyNums.map(n => 
                        `<span class="bg-black/80 px-2.5 py-1 rounded-lg text-sm font-bold text-transparent bg-clip-text bg-gradient-to-br from-amber-200 to-amber-500 border border-amber-500/30 shadow-[0_0_10px_rgba(212,175,55,0.2)]">${n}</span>`
                    ).join('');

                    html += `
                        <div class="chinese-card group animate-[fadeIn_0.5s_ease-in]">
                            <div class="p-4 border-b border-white/10 bg-black/60 flex justify-between items-start backdrop-blur-md">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 rounded-xl day-box flex flex-col items-center justify-center shadow-[inset_0_0_10px_rgba(193,18,31,0.2)]">
                                        <span class="text-xs text-slate-400">${item.month}</span>
                                        <span class="text-xl font-bold text-white leading-none">${item.day}</span>
                                    </div>
                                    <div>
                                        <div class="text-[10px] text-slate-400 tracking-widest">${item.solarDate}</div>
                                        <div class="font-bold ${item.color} text-sm">${item.animal} • ${item.element}</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="p-5 chinese-pattern relative">
                                <div class="absolute top-3 right-4">
                                    <span class="auspicious-badge"><i class="fa-solid fa-fire mr-1"></i> ${item.auspicious}</span>
                                </div>
                                
                                <div class="mt-6">
                                    <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">สถานะจันทรคติ (Lunar Energy)</p>
                                    <p class="text-sm font-serif text-gold-soft mb-4">${item.lunarDate}</p>
                                </div>

                                <div class="pt-4 border-t border-white/10">
                                    <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-1">
                                        <i class="fa-solid fa-database text-amber-500"></i> สถิติดีที่สุดประจำวัน ${item.solarDate.split(',')[0]}
                                    </p>
                                    <div class="flex gap-2">
                                        ${numsHtml}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                grid.innerHTML = html;

            } catch (error) {
                grid.innerHTML = '<div class="col-span-full text-center py-10 text-rose-500"><i class="fa-solid fa-server text-4xl mb-4"></i><p>ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาลองใหม่อีกครั้ง</p></div>';
            }
        }

        window.onload = renderChineseCalendar;
    </script>

    <script src="components/header.js?v=4"></script>
    <script src="components/footer.js"></script>

</body>
</html>
