        .glow-icon { filter: drop-shadow(0 0 10px currentColor); }

        /* Animation เขย่ากระบอกเซียมซี */
        @keyframes shake { 
            0%, 100% {transform: translate(0,0) rotate(0);} 
            25% {transform: translate(-5px, -5px) rotate(-8deg);} 
            50% {transform: translate(5px, 5px) rotate(8deg);} 
            75% {transform: translate(-5px, 5px) rotate(-8deg);} 
        }
        .animate-shake { 
            animation: shake 0.3s infinite; 
            filter: drop-shadow(0 0 25px rgba(251, 191, 36, 0.8));
        }

        /* ตกแต่งกระบอกเซียมซี */
        .siemsi-tube {
            background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5), inset 10px 10px 20px rgba(255,255,255,0.1), 0 10px 30px rgba(225, 29, 72, 0.3);
            border-top: 6px solid #fbbf24;
            border-bottom: 4px solid #450a0a;
            transition: all 0.3s ease;
        }
        
        /* แท่งไม้เซียมซี */
        .stick {
            position: absolute;
            top: -20px;
            width: 8px;
            height: 40px;

<body class="min-h-screen flex flex-col relative">



    <!-- Main Content -->
    <main class="flex-grow w-full max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10">
        
        <div class="text-center mb-8">

                <i class="fa-solid fa-yin-yang text-3xl text-rose-400 glow-icon"></i>
            </div>
            <h2 class="text-3xl md:text-4xl font-bold text-white drop-shadow-lg tracking-wide mb-2">เสี่ยงเซียมซี</h2>
            <p class="text-rose-200/70 font-light">ตั้งจิตอธิษฐานถึงสิ่งศักดิ์สิทธิ์ แล้วคลิกเพื่อเขย่าติ้ว</p>
        </div>

        <!-- พื้นที่กระบอกเซียมซี -->
        <div class="glass-panel rounded-3xl p-10 text-center border-t-2 border-t-rose-500 shadow-[0_0_30px_rgba(244,63,94,0.1)] relative overflow-hidden mb-8">
            
            <div class="relative w-32 h-48 mx-auto cursor-pointer group" onclick="shakeSiemsi()" id="tube-container">
                <!-- ไม้เซียมซีที่โผล่พ้นกระบอก -->
                <div class="stick left-4 group-hover:-translate-y-2 transition-transform"></div>
                <div class="stick left-10 -top-6 h-48 group-hover:-translate-y-4 transition-transform"></div>
                <div class="stick left-16 -top-4 h-46 group-hover:-translate-y-1 transition-transform"></div>
                <div class="stick left-22 -top-8 h-50 group-hover:-translate-y-5 transition-transform"></div>
                <div class="stick right-4 group-hover:-translate-y-3 transition-transform"></div>
                
                <!-- ตัวกระบอก -->
                <div id="siemsi-tube" class="siemsi-tube absolute bottom-0 w-full h-40 rounded-b-2xl flex items-center justify-center relative z-10">
                    <div class="w-16 h-16 rounded-full border-2 border-amber-400/50 flex items-center justify-center bg-black/20">
                        <span class="text-4xl font-bold text-amber-300 drop-shadow-[0_0_10px_rgba(251,191,36,0.8)]">吉</span>
                    </div>
                </div>
            </div>

            <button id="btn-shake" onclick="shakeSiemsi()" class="mt-10 px-10 py-4 rounded-full border border-rose-400/50 bg-gradient-to-r from-rose-900 to-red-900 hover:from-rose-800 hover:to-red-800 text-rose-100 transition-all font-bold shadow-[0_0_20px_rgba(225,29,72,0.4)] hover:shadow-[0_0_30px_rgba(225,29,72,0.7)] text-lg group">
                <i class="fa-solid fa-hand-sparkles mr-2 group-hover:animate-pulse"></i> เขย่ากระบอกเซียมซี
            </button>
        </div>

        <!-- ส่วนแสดงคำทำนาย -->
        <div id="siemsiAnalysisResult" class="hidden animate-[fadeIn_0.8s_ease-out]">
            
            <!-- Share Card Container -->
            <div id="capture-card-siemsi" class="relative bg-[#0B0B1A] border-2 border-amber-500/50 rounded-3xl p-6 md:p-10 shadow-[0_10px_40px_rgba(245,158,11,0.2)] overflow-hidden max-w-2xl mx-auto mb-6">
                <!-- Background ภายใน Share Card -->
                <div class="absolute inset-0 bg-[url('https://likitfah.com/img/9396.jpg')] bg-cover bg-center opacity-15"></div>
                <div class="absolute inset-0 bg-gradient-to-b from-red-950/90 via-slate-900/90 to-slate-950/95"></div>
                
                <!-- Content ภายใน Share Card -->
                <div class="relative z-10 text-center">
                    <p class="text-[10px] text-amber-500 font-bold mb-1 uppercase tracking-[0.3em]"><i class="fa-solid fa-fan mr-1"></i> Likit Fah Fortune Sticks</p>
                    <h3 class="text-2xl md:text-3xl font-bold text-white mb-6 drop-shadow-md tracking-wide border-b border-amber-500/30 pb-4">คำทำนายเซียมซี</h3>
                    <p class="text-xs text-amber-200/50 -mt-3 mb-6" id="siemsi-user-name">ผู้เสี่ยงทาย: -</p>
                    
                    <div class="bg-black/40 border border-amber-500/30 rounded-2xl p-6 mb-6 backdrop-blur-sm relative">
                        <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-[#0B0B1A] px-4 border border-amber-500/50 rounded-full">
                            <span class="text-amber-400 font-bold text-sm tracking-widest" id="share-siemsi-number">ใบที่ -</span>
                        </div>
                        
                        <!-- บทกลอน -->
                        <p class="text-lg md:text-xl font-serif font-bold text-amber-100 leading-loose whitespace-pre-line my-4 drop-shadow-sm" id="share-siemsi-poem">
                            กำลังรอผลสวรรค์...
                        </p>
                    </div>

                    <!-- ความหมายแยกหมวดหมู่ -->
                    <div class="text-left space-y-4 text-sm text-slate-200 bg-slate-900/60 p-6 rounded-2xl border border-white/10 backdrop-blur-md shadow-inner">
                        <p class="leading-relaxed"><strong class="text-amber-400 block mb-1"><i class="fa-solid fa-star w-5"></i> คำทำนายทั่วไป:</strong> <span id="share-siemsi-general">...</span></p>
                        <p class="leading-relaxed"><strong class="text-cyan-400 block mb-1"><i class="fa-solid fa-coins w-5"></i> การเงิน/การงาน:</strong> <span id="share-siemsi-finance">...</span></p>
                        <p class="leading-relaxed"><strong class="text-pink-400 block mb-1"><i class="fa-solid fa-heart w-5"></i> ความรัก:</strong> <span id="share-siemsi-love">...</span></p>
                        <p class="leading-relaxed"><strong class="text-emerald-400 block mb-1"><i class="fa-solid fa-heart-pulse w-5"></i> สุขภาพ:</strong> <span id="share-siemsi-health">...</span></p>
                    </div>

                    <div class="mt-8 pt-4 border-t border-white/10 text-[10px] text-amber-500/50 font-bold tracking-widest uppercase text-center">
                        <i class="fa-solid fa-feather-pointed mr-1"></i> www.LikitFah.com
                    </div>
                </div>
            </div>

            <!-- ปุ่มบันทึกภาพ -->
            <div class="text-center pb-10 flex flex-col md:flex-row items-center justify-center gap-4">
                <button onclick="downloadImage('capture-card-siemsi', 'btn-download-siemsi', 'Siemsi')" id="btn-download-siemsi" class="w-full md:w-auto bg-amber-600 hover:bg-amber-500 text-black font-bold py-4 px-10 rounded-full transition-all shadow-[0_0_20px_rgba(245,158,11,0.4)] hover:shadow-[0_0_30px_rgba(253,224,71,0.6)] text-lg">
                    <i class="fa-solid fa-download mr-2"></i> บันทึกภาพคำทำนาย
                </button>
                <button onclick="document.getElementById('siemsiAnalysisResult').classList.add('hidden'); window.scrollTo(0,0);" class="w-full md:w-auto px-6 py-4 rounded-full border border-rose-500/50 bg-rose-900/30 hover:bg-rose-800/50 text-rose-300 transition-colors text-sm font-bold">
                    <i class="fa-solid fa-rotate-right mr-2"></i> เสี่ยงใหม่อีกครั้ง
                </button>
            </div>

        </div>

    <script>
        const API_URL = localStorage.getItem('LikitFah_API_URL') || '/api'; 
        let isShaking = false;

        async function fetchWithTimeout(resource, options = {}) {
            const { timeout = 8000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            const response = await fetch(resource, { ...options, signal: controller.signal });
            clearTimeout(id);
            return response;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const userName = localStorage.getItem('user_fullname');
            if (userName) {
                document.getElementById('siemsi-user-name').innerText = `ผู้เสี่ยงทาย: คุณ ${userName}`;
            }
        });

        // เมื่อกดปุ่มหรือคลิกที่กระบอกเซียมซี
        async function shakeSiemsi() {
            if(isShaking) return; 
            isShaking = true;
            
            const btn = document.getElementById('btn-shake'); 
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> สิ่งศักดิ์สิทธิ์กำลังดลบันดาล...';
            btn.disabled = true;

            const tube = document.getElementById('tube-container'); 
            tube.classList.add('animate-shake');
            document.getElementById('siemsiAnalysisResult').classList.add('hidden');
            
            try {
                // ดึงข้อมูลเซียมซีจาก API
                const res = await fetchWithTimeout(`${API_URL}/siemsi/draw`);
                const data = await res.json();
                
                // หน่วงเวลาให้แอนิเมชันเขย่าทำงานสัก 1.5 วินาที เพื่อความตื่นเต้น
                setTimeout(() => {
                    tube.classList.remove('animate-shake');
                    
                    // อัปเดตข้อมูลบนการ์ด
                    document.getElementById('share-siemsi-number').innerText = data.number_text; 
                    document.getElementById('share-siemsi-poem').innerText = data.poem;
                    document.getElementById('share-siemsi-general').innerText = data.meaning_general;
                    document.getElementById('share-siemsi-finance').innerText = data.meaning_finance;
                    document.getElementById('share-siemsi-love').innerText = data.meaning_love;
                    document.getElementById('share-siemsi-health').innerText = data.meaning_health;

                    // โชว์ผลลัพธ์
                    document.getElementById('siemsiAnalysisResult').classList.remove('hidden');
                    document.getElementById('siemsiAnalysisResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
                    
                    // คืนค่าปุ่ม
                    btn.innerHTML = originalBtnText;
                    btn.disabled = false;
                    isShaking = false;
                }, 1500);

            } catch(e) { 
                console.error(e);
                tube.classList.remove('animate-shake'); 
                alert('ไม่สามารถเชื่อมต่อสิ่งศักดิ์สิทธิ์ได้ โปรดตรวจสอบระบบหลังบ้าน'); 
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
                isShaking = false; 
            }
        }

        // ระบบบันทึกภาพ (html2canvas)
        function downloadImage(cardId, btnId, filePrefix) {
            const cardElement = document.getElementById(cardId);
            const btn = document.getElementById(btnId);
            const originalBtnHtml = btn.innerHTML;
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังจารึกคำทำนาย...'; 
            btn.disabled = true;

            setTimeout(() => {
                html2canvas(cardElement, { 
                    scale: 2, 
                    useCORS: true, 
                    backgroundColor: '#0B0B1A',
                    logging: false
                }).then(canvas => {
                    const link = document.createElement('a');
                    const siemsiNum = document.getElementById('share-siemsi-number').innerText.replace(/\s+/g, '_');
                    link.download = `LikitFah_${filePrefix}_${siemsiNum}.png`;
                    link.href = canvas.toDataURL("image/png"); 
                    link.click();
                    
                    btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> บันทึกสำเร็จ!';
                    setTimeout(() => { 
                        btn.innerHTML = originalBtnHtml; 
                        btn.disabled = false; 
                    }, 2000);
                }).catch((err) => { 
                    console.error("Canvas Error:", err);
                    btn.innerHTML = originalBtnHtml; 
                    btn.disabled = false; 
                    alert("เกิดข้อผิดพลาดในการบันทึกภาพ");
                });
            }, 100);
        }
    </script>
