    <script>
        let audioCtx;
        let isSoundOn = true;
        const API_URL = 'api_tarot.php'; 
        let globalUserName = "ผู้ไขชะตาสวรรค์";
        
        let maxCards = 3; 
        let readingTypeName = "อดีต-ปัจจุบัน-อนาคต";
        let pickedCardsCount = 0;
        let cardDOMs = []; 
        let selectedCards = []; 
        let fetchedCardsData = []; 
        let gameState = 'init'; 

        // 🌟 ตัวแปรระบบเสียง AI (Text-to-Speech)
        let speechSynth = window.speechSynthesis;
        let speechUtterance = null;
        let isReadingAloud = false;

        const celticCrossPositions = [
            "หัวใจแห่งชะตา (สถานการณ์ปัจจุบัน)", "สิ่งขวางกั้น (อุปสรรคที่เผชิญ)", "รากฐาน (อดีตหรือจิตใต้สำนึก)", 
            "อดีตอันใกล้ (เหตุการณ์ที่เพิ่งผ่าน)", "มงกุฎ (เป้าหมายหรือสิ่งที่คาดหวัง)", "อนาคตอันใกล้ (สิ่งที่กำลังจะเกิด)", 
            "จุดยืน (ทัศนคติต่อปัญหา)", "สิ่งแวดล้อม (ปัจจัยภายนอก/คนรอบข้าง)", "ความหวังและความกลัว", "บทสรุปแห่งโชคชะตา"
        ];

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function toggleSound() { isSoundOn = !isSoundOn; document.getElementById('btn-sound').innerHTML = isSoundOn ? '<i class="fa-solid fa-volume-high"></i> เสียง' : '<i class="fa-solid fa-volume-xmark"></i> ปิดเสียง'; }
        function playClickSound() { if(!isSoundOn || !audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1); osc.start(); osc.stop(audioCtx.currentTime + 1); }
        function playSweepSound() { if(!isSoundOn || !audioCtx) return; const bufferSize = audioCtx.sampleRate * 0.4; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate); const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1; const noise = audioCtx.createBufferSource(); noise.buffer = buffer; const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 1000; const gain = audioCtx.createGain(); noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.015, audioCtx.currentTime + 0.1); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4); noise.start(); }

        document.addEventListener('DOMContentLoaded', () => {
            const userName = localStorage.getItem('user_fullname');
            if (userName) {
                globalUserName = userName;
                document.getElementById('tarot-user-name').innerText = `สำหรับ: คุณ${userName}`;
            }
        });

        // 🌟 ยกเลิกเสียงอ่านหากผู้ใช้ปิดแท็บหรือรีเฟรชหน้า
        window.addEventListener('beforeunload', () => {
            if(speechSynth) speechSynth.cancel();
        });

        function setReadingMode(limit, name) {
            maxCards = limit;
            readingTypeName = name;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode-${limit}`).classList.add('active');
        }

        function startDrawing() {
            initAudio(); 
            document.getElementById('mode-selection').classList.add('hidden');
            document.getElementById('drawing-area').classList.remove('hidden');
            
            gameState = 'select';
            updateInstruction();
            renderDeckArc();
        }

       
        // กางพัดไพ่ หรือ วงกลม (ขึ้นอยู่กับขนาดจอ)
        function renderDeckArc() {
            const board = document.getElementById('tarot-board');
            board.innerHTML = '';
            cardDOMs = [];
            
            const isMobile = window.innerWidth < 768;
            
            // 🌟 ตั้งค่ามุม: มือถือจัดเป็นวงกลม 360 องศา, คอมจัดเป็นพัดโค้ง
            const startAngle = isMobile ? 0 : -75;
            const endAngle = isMobile ? 360 : 75;
            const angleStep = isMobile ? (360 / 78) : (endAngle - startAngle) / 77;
            
            const cx = board.offsetWidth / 2;
            
            // 🌟 ปรับจุดศูนย์กลางและรัศมีให้พอดีกับหน้าจอมือถือ (ไม่ล้นขอบ)
            const radius = isMobile ? (board.offsetWidth / 2) - 25 : 450; 
            const cy = isMobile ? (board.offsetHeight / 2) : radius + 120; 

            // ปรับขนาดไพ่ตอนเรียงวงกลมให้พอดี
            const fanCardW = isMobile ? 35 : 65;
            const fanCardH = isMobile ? 60 : 115;

            playSweepSound();

            for(let i=0; i<78; i++) {
                setTimeout(() => {
                    const angleDeg = startAngle + (i * angleStep);
                    const angleRad = (angleDeg - 90) * (Math.PI / 180);
                    
                    // คำนวณพิกัด X, Y แบบวงกลม
                    const x = cx + (Math.cos(angleRad) * radius); 
                    const y = cy + (Math.sin(angleRad) * radius);

                    const el = document.createElement('div');
                    el.className = 'tarot-card';
                    el.style.width = `${fanCardW}px`;
                    el.style.height = `${fanCardH}px`;
                    el.style.left = `${x - (fanCardW/2)}px`;
                    el.style.top = `${y - (fanCardH/2)}px`;
                    
                    el.style.setProperty('--rot', `${angleDeg}deg`);
                    el.style.transform = `rotate(var(--rot))`;
                    el.style.zIndex = i;
                    
                    el.innerHTML = `
                        <div class="card-inner">
                            <div class="card-face mystic-back">
                                <img src="https://likitfah.com/img/card/Back-Cover.webp" alt="Tarot Back">
                            </div>
                            <div class="card-face mystic-front" id="front-${i}"></div>
                        </div>
                    `;
                    
                    el.onclick = () => handleCardClick(el);
                    board.appendChild(el);
                    cardDOMs.push({ el: el, index: i });
                }, i * 8); 
            }
        }

        // จัดการคลิกเลือกไพ่
        function handleCardClick(el) {
            if (gameState === 'select') {
                if (pickedCardsCount >= maxCards || el.classList.contains('picked')) return;
                
                playClickSound();
                el.classList.add('picked');
                el.style.transform = `rotate(var(--rot)) translateY(-40px) scale(1.15)`;
                el.style.zIndex = 1000 + pickedCardsCount;
                
                selectedCards.push({ el: el, layoutIndex: pickedCardsCount });
                pickedCardsCount++;
                updateInstruction();

                if (pickedCardsCount === maxCards) {
                    gameState = 'loading';
                    document.getElementById('main-instruction').innerHTML = `COMMUNING...`;
                    document.getElementById('sub-instruction').innerText = "กำลังเชื่อมต่อพลังงานจักรวาล";
                    setTimeout(fetchTarotAPI, 800);
                }
            }
        }

        function updateInstruction() {
            document.getElementById('main-instruction').innerText = `SEEK YOUR TRUTH`;
            document.getElementById('sub-instruction').innerText = `ตั้งสมาธิ แล้วเลือกไพ่ ${pickedCardsCount} / ${maxCards} ใบ`;
        }

        async function fetchTarotAPI() {
            try {
                const res = await fetch(`/api/tarot/draw?limit=${maxCards}`);
                if (!res.ok) throw new Error("API Error");
                const data = await res.json();
                
                if (!data || !data.cards || data.cards.length === 0) throw new Error("No data from API");
                
                if (data.cards.length < maxCards) {
                    maxCards = data.cards.length;
                    selectedCards = selectedCards.slice(0, maxCards);
                }

                fetchedCardsData = data.cards.map(card => ({ ...card, isReversed: Math.random() < 0.25 }));
                layoutCards();
            } catch(e) {
                console.error(e);
                alert("ไม่สามารถดึงข้อมูลคำทำนายได้ โปรดตรวจสอบการเชื่อมต่อฐานข้อมูล");
                window.location.reload();
            }
        }

        function getSafeImageUrl(cardId) {
            if (!cardId) return 'https://likitfah.com/img/card/Front-Cover.webp';
            const id = String(cardId).toUpperCase();
            let folder = 'Arcana';
            if (id.startsWith('W') || id.includes('WAND')) folder = 'Wands';
            else if (id.startsWith('C') || id.includes('CUP')) folder = 'Cups';
            else if (id.startsWith('S') || id.includes('SWORD')) folder = 'Swords';
            else if (id.startsWith('P') || id.includes('PENTACLE')) folder = 'Pentacles';
            
            return `https://likitfah.com/img/card/${folder}/${id}.webp`;
        }

        function layoutCards() {
            cardDOMs.forEach(c => { 
                if (!c.el.classList.contains('picked')) { 
                    c.el.style.opacity = '0'; 
                    c.el.style.pointerEvents = 'none'; 
                } 
            });

            const board = document.getElementById('tarot-board');
            const cx = board.offsetWidth / 2;
            const cy = board.offsetHeight / 2;
            const isMobile = window.innerWidth < 768;
            
            let cardW, cardH;
            if (maxCards === 1 || maxCards === 3) {
                // 🌟 ปรับขนาดไพ่ 3 ใบให้เล็กลงนิดนึงในมือถือ จะได้พอดีจอ
                cardW = isMobile ? 85 : 170;
                cardH = isMobile ? 150 : 295;
            } else {
                // ไพ่ 10 ใบ
                cardW = isMobile ? 45 : 90;
                cardH = isMobile ? 80 : 155;
            }

            const hw = cardW / 2; 
            const hh = cardH / 2;
            let coords = [];

            if (maxCards === 1) {
                coords = [{ x: cx, y: cy, rot: 0 }];
            } else if (maxCards === 3) {
                const gap = cardW + (isMobile ? 10 : 30); 
                coords = [{ x: cx - gap, y: cy, rot: 0 }, { x: cx, y: cy, rot: 0 }, { x: cx + gap, y: cy, rot: 0 }];
            } else {
                // ระยะห่างแบบ Celtic Cross สำหรับมือถือ
                const gx = cardW + (isMobile ? 10 : 15); 
                const gy = cardH / 2 + (isMobile ? 5 : 10);
                const rx = cx + (isMobile ? 80 : 160); 
                const lx = cx - (isMobile ? 35 : 60);
                coords = [
                    { x: lx, y: cy, rot: 0 }, { x: lx, y: cy, rot: 90 }, { x: lx, y: cy + gy*2.2, rot: 0 },
                    { x: lx - gx*1.1, y: cy, rot: 0 }, { x: lx, y: cy - gy*2.2, rot: 0 }, { x: lx + gx*1.1, y: cy, rot: 0 },
                    { x: rx, y: cy + gy*2.8, rot: 0 }, { x: rx, y: cy + gy*0.9, rot: 0 }, { x: rx, y: cy - gy*0.9, rot: 0 }, { x: rx, y: cy - gy*2.8, rot: 0 }
                ];
            }

            playSweepSound();

            selectedCards.forEach((item, i) => {
                setTimeout(() => {
                    try {
                        const el = item.el;
                        const c = fetchedCardsData[i];
                        const frontEl = el.querySelector('.mystic-front');
                        
                        const imgUrl = getSafeImageUrl(c ? c.card_id : null);
                        
                        frontEl.innerHTML = `
                            <div class="absolute inset-0 flex items-center justify-center text-gold/30">
                                <i class="fa-solid fa-spinner fa-spin text-2xl"></i>
                            </div>
                            <img src="${imgUrl}" loading="lazy" class="relative z-10 w-full h-full object-cover" style="border-radius: inherit;" onload="this.previousElementSibling.style.display='none'" onerror="this.onerror=null; this.src='https://likitfah.com/img/card/Front-Cover.webp'; this.previousElementSibling.style.display='none';">
                        `;
                        
                        if(c && c.isReversed) el.classList.add('is-reversed');

                        const p = coords[i];
                        el.style.width = `${cardW}px`;
                        el.style.height = `${cardH}px`;
                        el.style.left = `${p.x - hw}px`; 
                        el.style.top = `${p.y - hh}px`;
                        el.style.setProperty('--rot', `${p.rot}deg`); 
                        el.style.transform = `rotate(var(--rot))`;
                        el.style.zIndex = 100 + i;
                    } catch(err) { console.error("Layout error", err); }
                }, i * 200);
            });

            setTimeout(autoRevealCards, (maxCards * 200) + 800);
        }

        function autoRevealCards() {
            document.getElementById('main-instruction').innerText = `THE VEIL IS LIFTED`;
            document.getElementById('sub-instruction').innerText = "โชคชะตาปรากฏแล้ว เลื่อนลงด้านล่างเพื่ออ่านและบันทึกคำทำนาย";
            gameState = 'reading'; 

            selectedCards.forEach((item, i) => {
                setTimeout(() => {
                    if (item && item.el) {
                        item.el.classList.add('is-flipped');
                        item.el.classList.add('reveal-glow'); 
                        playRevealSound();
                    }
                }, i * 500); 
            });

            setTimeout(() => {
                try { buildResults(); } catch(err) { console.error(err); alert("เกิดข้อผิดพลาดในการแสดงผลคำทำนาย"); }
            }, (maxCards * 500) + 500);
        }

        function buildResults() {
            let miniCardsHtml = '';
            let meaningsHtml = '';
            let gridClass = maxCards === 10 ? 'col-span-1 md:col-span-2' : '';

            fetchedCardsData.forEach((c, i) => {
                if (!c) return; 

                const isRev = !!c.isReversed;
                const revClass = isRev ? 'rotate-180' : '';
                const revText = isRev ? '<span class="text-rose-500 font-bold ml-1">(R)</span>' : '';
                const imgUrl = getSafeImageUrl(c.card_id);
                
                let posTitle = maxCards === 10 ? celticCrossPositions[i] : (maxCards === 3 ? ["อดีต / ต้นเหตุ", "ปัจจุบัน / สถานการณ์", "อนาคต / บทสรุป"][i] : "คำทำนายประจำวัน");
                posTitle = posTitle || "คำทำนาย";

                let cardWidthClass = maxCards === 10 ? 'w-16 md:w-24' : 'w-28 md:w-40';
                let imgSizeClass = maxCards === 10 ? 'w-12 h-20 md:w-20 md:h-32' : 'w-24 h-40 md:w-36 md:h-60';

                miniCardsHtml += `
                <div class="flex flex-col items-center bg-[#11081f] border border-gold/30 p-2 md:p-3 rounded-xl ${cardWidthClass} shadow-lg">
                    <p class="text-[8px] md:text-[10px] text-gold-light font-bold mb-1 md:mb-2 text-center h-6 md:h-8 flex items-center">${posTitle}</p>
                    <img src="${imgUrl}" class="${imgSizeClass} object-cover rounded shadow-md mb-2 md:mb-3 ${revClass}" onerror="this.onerror=null; this.src='https://likitfah.com/img/card/Front-Cover.webp'">
                    <span class="text-[8px] md:text-[10px] text-white font-bold text-center leading-tight font-serif uppercase">${c.name_en || ''} ${revText}</span>
                </div>`;

                let yesNoBadge = '';
                if (c.yes_no_answer) {
                    let bColor = 'text-amber-400 border-amber-500/50 bg-amber-900/30'; 
                    let ansStr = String(c.yes_no_answer).toLowerCase();
                    if (ansStr.includes('yes') || ansStr.includes('ใช่')) bColor = 'text-emerald-400 border-emerald-500/50 bg-emerald-900/30';
                    if (ansStr.includes('no') || ansStr.includes('ไม่')) bColor = 'text-rose-400 border-rose-500/50 bg-rose-900/30';
                    yesNoBadge = `<span class="px-2 py-1 rounded border ${bColor} text-[9px] font-bold"><i class="fa-solid fa-circle-question mr-1"></i>คำตอบ: ${c.yes_no_answer}</span>`;
                }

                let displayMeaning = (isRev && c.meaning_reversed) ? `<span class="text-rose-400 font-bold">[ไพ่กลับหัว]</span> ${c.meaning_reversed}` : (c.meaning_general || '-');
                let keywordText = c.keyword || 'คำทำนาย';
                let workText = c.meaning_work_finance || '-';
                let loveText = c.meaning_love || '-';
                let adviceText = c.advice || '-';
                let healthText = c.meaning_health || '';
                let titleText = c.name_th || c.name_en || 'ไม่พบข้อมูลไพ่';

                meaningsHtml += `
                <div class="bg-[#0f0a1a] p-5 md:p-8 rounded-2xl border border-gold/20 shadow-xl ${gridClass}">
                    <div class="flex items-center gap-4 mb-5 border-b border-gold/20 pb-4">
                        <div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-gold-dark/40 flex items-center justify-center border border-gold/50 text-gold-light font-bold text-lg shrink-0 font-serif shadow-inner">${i+1}</div>
                        <div class="flex-1">
                            <h4 class="text-base md:text-xl font-bold ${isRev ? 'text-rose-400' : 'text-gold-light'} uppercase tracking-wider">[${posTitle}] ${titleText}</h4>
                            <p class="text-[10px] md:text-xs text-gold/60 uppercase tracking-widest font-serif mt-0.5">${keywordText}</p>
                        </div>
                    </div>

                    <div class="flex flex-wrap gap-2 mb-4">
                        ${c.card_type ? `<span class="px-2 py-1 rounded border border-purple-500/40 bg-purple-900/40 text-purple-200 text-[9px] font-bold">${c.card_type}</span>` : ''}
                        ${c.element ? `<span class="px-2 py-1 rounded border border-blue-500/40 bg-blue-900/40 text-blue-200 text-[9px] font-bold">ธาตุ: ${c.element}</span>` : ''}
                        ${yesNoBadge}
                    </div>
                    
                    <div class="space-y-3 text-slate-200 text-xs md:text-sm font-light">
                        <p class="leading-relaxed"><strong class="text-gold"><i class="fa-solid fa-star w-5"></i> ภาพรวม:</strong> ${displayMeaning}</p>
                        <p class="leading-relaxed"><strong class="text-emerald-400"><i class="fa-solid fa-coins w-5"></i> การงาน/เงิน:</strong> ${workText}</p>
                        <p class="leading-relaxed"><strong class="text-pink-400"><i class="fa-solid fa-heart w-5"></i> ความรัก:</strong> ${loveText}</p>
                        ${healthText ? `<p class="leading-relaxed"><strong class="text-rose-400"><i class="fa-solid fa-heart-pulse w-5"></i> สุขภาพ:</strong> ${healthText}</p>` : ''}
                    </div>
                    <div class="mt-5 pt-4 border-t border-gold/10 text-xs md:text-sm text-gold-light italic">
                        <strong class="text-gold"><i class="fa-solid fa-lightbulb mr-2"></i>คำแนะนำ:</strong> ${adviceText}
                    </div>
                </div>`;
            });

            const now = new Date();
            const thM = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            document.getElementById('tarot-timestamp').innerHTML = `
                <i class="fa-solid fa-user-check mr-1"></i> ของคุณ: ${globalUserName} | 
                <i class="fa-regular fa-clock ml-2 mr-1"></i> ${now.getDate()} ${thM[now.getMonth()]} ${now.getFullYear()+543} เวลา ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} น.
            `;

            document.getElementById('reading-type-display').innerText = readingTypeName.toUpperCase();
            document.getElementById('share-card-images').innerHTML = miniCardsHtml;
            document.getElementById('tarot-meaning-container').innerHTML = meaningsHtml;
            
            document.getElementById('tarotAnalysisResult').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('tarotAnalysisResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 500);
        }

        // 🌟 ระบบ AI อ่านคำทำนาย (Text-to-Speech) อัปเกรดเสียงเนียน
        function toggleSpeech() {
            const btn = document.getElementById('btn-speech');
            
            if (isReadingAloud || speechSynth.speaking) {
                speechSynth.cancel();
                isReadingAloud = false;
                btn.innerHTML = '<i class="fa-solid fa-volume-high mr-2"></i> ให้ AI อ่านคำทำนาย';
                btn.classList.remove('animate-pulse', 'border-indigo-400');
                btn.classList.add('border-indigo-400/50');
                return;
            }

            if (fetchedCardsData.length === 0) return;

            // เอาจุดไข่ปลาออก ใช้การเว้นวรรคแทน
            let textToRead = "ผลการทำนายไพ่ทาโรต์ของคุณ มีดังนี้ค่ะ ";
            
            fetchedCardsData.forEach((c, i) => {
                if (!c) return;
                let posTitle = maxCards === 10 ? celticCrossPositions[i] : (maxCards === 3 ? ["อดีต", "ปัจจุบัน", "อนาคต"][i] : "ประจำวัน");
                
                let meaning = (c.isReversed && c.meaning_reversed) ? c.meaning_reversed : (c.meaning_general || '');
                let advice = c.advice || '';
                
                textToRead += `ใบที่ ${i+1} ตำแหน่ง ${posTitle} ได้ไพ่ ${c.name_th} `;
                if(c.isReversed) textToRead += "ซึ่งเป็นไพ่กลับหัว ";
                
                // 🌟 แก้คำว่า "ภาพรวม" เป็น "ความหมายโดยรวม" ป้องกัน AI สะกดคำผิด 🌟
                textToRead += `ความหมายโดยรวมคือ ${meaning} `;
                textToRead += `คำแนะนำเพิ่มเติม ${advice} `;
            });
            
            textToRead += "ลิขิตฟ้าขอให้คุณโชคดีและสมหวังดั่งปรารถนาค่ะ";

            speechUtterance = new SpeechSynthesisUtterance(textToRead);
            speechUtterance.lang = 'th-TH'; 
            
            // 🌟 ระบบสแกนหาเสียงภาษาไทยที่ดีที่สุดในเครื่อง (Premium Voice) 🌟
            let voices = speechSynth.getVoices();
            let bestThaiVoice = voices.find(v => v.lang.includes('th') && (v.name.includes('Premium') || v.name.includes('Kanya') || v.name.includes('Narisa')));
            
            if (!bestThaiVoice) {
                bestThaiVoice = voices.find(v => v.lang.includes('th'));
            }
            
            if (bestThaiVoice) {
                speechUtterance.voice = bestThaiVoice;
            }

            speechUtterance.rate = 0.85; // ปรับสปีดให้อ่านช้าลงนิดนึง ฟังดูเป็นผู้ใหญ่
            speechUtterance.pitch = 1.0;

            speechUtterance.onend = function() {
                isReadingAloud = false;
                btn.innerHTML = '<i class="fa-solid fa-volume-high mr-2"></i> ให้ AI อ่านคำทำนาย';
                btn.classList.remove('animate-pulse', 'border-indigo-400');
                btn.classList.add('border-indigo-400/50');
            };
            
            speechUtterance.onerror = function() {
                isReadingAloud = false;
                btn.innerHTML = '<i class="fa-solid fa-volume-high mr-2"></i> ให้ AI อ่านคำทำนาย';
                btn.classList.remove('animate-pulse', 'border-indigo-400');
                btn.classList.add('border-indigo-400/50');
            };

            speechSynth.speak(speechUtterance);
            isReadingAloud = true;
            btn.innerHTML = '<i class="fa-solid fa-stop mr-2"></i> หยุดอ่านคำทำนาย';
            btn.classList.remove('border-indigo-400/50');
            btn.classList.add('animate-pulse', 'border-indigo-400');
        }
        
        // บังคับให้เบราว์เซอร์โหลดเสียงเตรียมไว้ล่วงหน้า (แก้บัคเสียงไม่มาในบางเครื่อง)
        if (speechSynth.onvoiceschanged !== undefined) {
            speechSynth.onvoiceschanged = () => speechSynth.getVoices();
        }
        

        // HTML2Canvas เซฟรูป
        function downloadImage(cardId, btnId, filePrefix) {
            const cardElement = document.getElementById(cardId);
            const btn = document.getElementById(btnId);
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> จารึกรูปไพ่และคำทำนาย...'; 
            btn.disabled = true;

            setTimeout(() => {
                const renderScale = maxCards === 10 ? 1.5 : 2;
                html2canvas(cardElement, { scale: renderScale, useCORS: true, backgroundColor: '#05020a', logging: false })
                .then(canvas => {
                    const link = document.createElement('a');
                    link.download = `LikitFah_${filePrefix}_${maxCards}Cards.png`;
                    link.href = canvas.toDataURL("image/png"); 
                    link.click();
                    btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> บันทึกสำเร็จ!';
                    setTimeout(() => { btn.innerHTML = originalBtnHtml; btn.disabled = false; }, 2000);
                }).catch(() => { 
                    btn.innerHTML = originalBtnHtml; btn.disabled = false; 
                    alert("เกิดข้อผิดพลาดในการบันทึกภาพ");
                });
            }, 200);
        }
    </script>
