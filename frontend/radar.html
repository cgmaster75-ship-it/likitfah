    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #05050A; color: #fff; font-family: 'Prompt', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .space-font { font-family: 'Space Mono', monospace; }
        
        .heat-box {
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 4px; font-weight: bold; position: relative; overflow: hidden;
            transition: all 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        @media (min-width: 768px) { .heat-box { border-radius: 8px; } }
        .heat-box:hover { transform: scale(1.15); z-index: 10; box-shadow: 0 0 20px rgba(255,255,255,0.4); border-color: #fff; cursor: pointer; }
        
        .num-label { font-size: 0.9rem; line-height: 1; z-index: 2; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); color: #fff; margin-bottom: 2px; }
        @media (min-width: 768px) { .num-label { font-size: 1.3rem; margin-bottom: 0; } }
        
        .count-label { font-size: 0.6rem; opacity: 0.9; z-index: 2; text-shadow: 1px 1px 2px rgba(0,0,0,0.9); white-space: nowrap; }
        @media (min-width: 768px) { .count-label { font-size: 0.7rem; margin-top: -2px; } }
        
        .toggle-container { background: #111827; padding: 5px; border-radius: 50px; display: inline-flex; position: relative; border: 1px solid #374151; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        .toggle-btn { padding: 10px 30px; border-radius: 40px; cursor: pointer; z-index: 2; transition: all 0.3s; font-weight: 600; width: 120px; text-align: center; }
        .toggle-btn.active { color: white; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .toggle-btn:not(.active) { color: #6b7280; }
        
        .toggle-slider { position: absolute; top: 5px; bottom: 5px; width: 110px; border-radius: 40px; z-index: 1; transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); }
        .mode-bottom .toggle-slider { left: 5px; background: linear-gradient(135deg, #ef4444, #991b1b); box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
        .mode-top .toggle-slider { left: 125px; background: linear-gradient(135deg, #3b82f6, #1e3a8a); box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        
        select { background: #1f2937; border: 1px solid #374151; color: #fff; padding: 8px 16px; border-radius: 8px; outline: none; cursor: pointer; }
        select:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="p-2 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-6">
            <h1 class="text-4xl md:text-5xl font-bold mb-3 tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-gray-100 to-gray-500">
                <i class="fa-solid fa-radar"></i> เรดาร์ 100 ประตู <span class="text-sm bg-red-600 text-white px-2 py-1 rounded align-top ml-2">PRO</span>
            </h1>
            <p class="text-gray-400 text-sm">ค้นหาแพทเทิร์นลับจากสถิติหวยย้อนหลัง 20 ปี</p>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center bg-slate-900/80 p-5 rounded-xl border border-slate-700 mb-6 gap-4 shadow-lg">
            
            <div class="flex gap-3 items-center w-full md:w-auto justify-center">
                <i class="fa-regular fa-calendar-days text-gray-400"></i>
                <select id="filter-day" onchange="fetchHeatmapData()">
                    <option value="">ทุกวัน</option>
                    <option value="อาทิตย์">วันอาทิตย์</option>
                    <option value="จันทร์">วันจันทร์</option>
                    <option value="อังคาร">วันอังคาร</option>
                    <option value="พุธ">วันพุธ</option>
                    <option value="พฤหัสบดี">วันพฤหัสบดี</option>
                    <option value="ศุกร์">วันศุกร์</option>
                    <option value="เสาร์">วันเสาร์</option>
                </select>
                <select id="filter-month" onchange="fetchHeatmapData()">
                    <option value="">ทุกเดือน</option>
                    <option value="1">มกราคม</option>
                    <option value="2">กุมภาพันธ์</option>
                    <option value="3">มีนาคม</option>
                    <option value="4">เมษายน</option>
                    <option value="5">พฤษภาคม</option>
                    <option value="6">มิถุนายน</option>
                    <option value="7">กรกฎาคม</option>
                    <option value="8">สิงหาคม</option>
                    <option value="9">กันยายน</option>
                    <option value="10">ตุลาคม</option>
                    <option value="11">พฤศจิกายน</option>
                    <option value="12">ธันวาคม</option>
                </select>
            </div>

            <div class="toggle-container mode-bottom" id="toggle-container">
                <div class="toggle-slider"></div>
                <div class="toggle-btn active" id="btn-bottom" onclick="switchMode('bottom')">2 ตัวล่าง</div>
                <div class="toggle-btn" id="btn-top" onclick="switchMode('top')">2 ตัวบน</div>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="stats-panel">
            <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700 text-center">
                <p class="text-xs text-gray-400 mb-1">สูง (50-99) vs ต่ำ (00-49)</p>
                <p class="text-xl font-bold"><span class="text-red-400" id="stat-high">0%</span> <span class="text-gray-500">/</span> <span class="text-blue-400" id="stat-low">0%</span></p>
            </div>
            <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700 text-center">
                <p class="text-xs text-gray-400 mb-1">ออกบ่อยสุด (Max Hit)</p>
                <p class="text-xl font-bold text-emerald-400"><span id="max-count-label">0</span> <span class="text-sm text-gray-400 font-normal">ครั้ง</span></p>
            </div>
            <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700 text-center">
                <p class="text-xs text-gray-400 mb-1">คู่-คู่ / คี่-คี่</p>
                <p class="text-lg font-bold"><span id="stat-ee">0</span> <span class="text-sm text-gray-500 font-normal">vs</span> <span id="stat-oo">0</span></p>
            </div>
            <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700 text-center">
                <p class="text-xs text-gray-400 mb-1">คู่-คี่ / คี่-คู่</p>
                <p class="text-lg font-bold"><span id="stat-eo">0</span> <span class="text-sm text-gray-500 font-normal">vs</span> <span id="stat-oe">0</span></p>
            </div>
        </div>

        <div class="grid grid-cols-10 gap-[2px] md:gap-2" id="radar-grid">
            </div>
    </div>

    <script>
        let lottoData = { bottom: null, top: null };
        let currentMode = 'bottom'; 

        async function fetchHeatmapData() {
            try {
                // ดึงค่าจากฟิลเตอร์
                const day = document.getElementById('filter-day').value;
                const month = document.getElementById('filter-month').value;
                
                // สร้าง URL พ่วง Query String
                let url = '/api/lotto/heatmap?';
                if (day) url += `day=${encodeURIComponent(day)}&`;
                if (month) url += `month=${month}`;

                const response = await fetch(url);
                const data = await response.json();
                lottoData = data;
                renderRadar(); 
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            const container = document.getElementById('toggle-container');
            
            if (mode === 'bottom') {
                container.className = 'toggle-container mode-bottom';
                document.getElementById('btn-bottom').classList.add('active');
                document.getElementById('btn-top').classList.remove('active');
            } else {
                container.className = 'toggle-container mode-top';
                document.getElementById('btn-top').classList.add('active');
                document.getElementById('btn-bottom').classList.remove('active');
            }
            renderRadar();
        }

        function getThermalColor(heatPercentage) {
            if (heatPercentage === 0) return 'rgba(30, 41, 59, 0.4)'; 
            const hue = (100 - heatPercentage) * 2.4; 
            return `hsl(${hue}, 90%, 45%)`; 
        }

        function renderRadar() {
            if (!lottoData[currentMode]) return;

            const grid = document.getElementById('radar-grid');
            const { max_count, data, stats } = lottoData[currentMode];
            
            // อัปเดตสถิติภาพรวม
            document.getElementById('max-count-label').innerText = max_count;
            
            if(stats.total > 0) {
                const highPct = Math.round((stats.high / stats.total) * 100);
                const lowPct = Math.round((stats.low / stats.total) * 100);
                document.getElementById('stat-high').innerText = highPct + '%';
                document.getElementById('stat-low').innerText = lowPct + '%';
                
                document.getElementById('stat-ee').innerText = stats.evenEven;
                document.getElementById('stat-oo').innerText = stats.oddOdd;
                document.getElementById('stat-eo').innerText = stats.evenOdd;
                document.getElementById('stat-oe').innerText = stats.oddEven;
            }

            grid.innerHTML = '';

            data.forEach(item => {
                const box = document.createElement('div');
                const heatOpacity = item.heat; 
                const bgColor = getThermalColor(heatOpacity);

                box.className = `heat-box shadow-md`;
                box.style.backgroundColor = bgColor;

                box.innerHTML = `
                    <span class="num-label space-font">${item.number}</span>
                    <span class="count-label" style="color: ${heatOpacity < 30 ? '#aaa' : '#fff'}">${item.count}<span class="hidden md:inline"> ครั้ง</span></span>
                `;
                
                if(item.heat === 100 && item.count > 0) {
                    box.style.boxShadow = '0 0 20px rgba(255, 0, 0, 0.8), inset 0 0 10px rgba(255,255,255,0.5)';
                    box.style.border = '2px solid #fff';
                    box.classList.add('animate-pulse'); 
                }

                grid.appendChild(box);
            });
        }

        fetchHeatmapData();
    </script>
	<script src="components/header.js?v=4"></script> <script src="components/tracking.js"></script>
    <script src="components/navbar.js"></script>
</body>
</html>
