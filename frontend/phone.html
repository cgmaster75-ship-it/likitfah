    <script>
        // ==========================================
        // 📚 ฐานข้อมูลความหมายคู่เลข (00-99) ระดับพรีเมียม
        // ==========================================
        const pairDB = {
            "00": "โลกส่วนตัวสูง คิดมาก ลึกลับ", "01": "เชื่อมั่นตนเองสูง ใจร้อน ชอบอิสระ",
            "14": "สติปัญญาดี ผู้ใหญ่เมตตา ประสบความสำเร็จ", "15": "มีเสน่ห์ นุ่มนวล มีโชคลาภ",
            "16": "วางแผนเก่ง รอบคอบ มั่นคง", "19": "ผู้นำ โดดเด่น มีอำนาจบารมี",
            "22": "อ่อนหวาน อ่อนโยน มีเสน่ห์ทางคำพูด", "23": "มหาเสน่ห์ วาจาเรียกทรัพย์ เมตตามหานิยม",
            "24": "วาจาเป็นทรัพย์ ปากพารวย ติดต่อประสานงานดีเยี่ยม", "26": "สุนทรีย์ มีโชคเรื่องรักและการเงิน",
            "28": "ใจใหญ่ กล้าได้กล้าเสีย มีลาภลอย", "35": "ขยัน อดทน พลังงานสูง",
            "36": "การเงินหมุนเวียนดี มีเสน่ห์แรง", "39": "ชัยชนะจากการแข่งขัน มีโชคลาภ",
            "41": "การเจรจาสำเร็จ มีปัญญาเป็นเลิศ", "42": "เป็นที่รักของคนรอบข้าง มีมิตรแท้",
            "44": "ไหวพริบดี พูดจาฉะฉาน ทันคน", "45": "ปัญญาธิการ ประสบความสำเร็จอย่างยั่งยืน",
            "46": "การเงินดี มีความสุข ร่าเริง", "51": "ความสำเร็จที่งดงาม มั่นคง มีเหตุผล",
            "54": "วิชาการดี ผู้ใหญ่สนับสนุน มั่นคง", "55": "สุขสงบ มีสติ ปัญญาทางธรรม",
            "56": "คู่ทรัพย์คู่โชค การเงินความรักสมบูรณ์", "59": "สิ่งศักดิ์สิทธิ์คุ้มครอง มีลางสังหรณ์ดี",
            "63": "พลังแห่งความรักและความร่ำรวย", "64": "ฉลาดหาเงิน มีโชคลาภเสมอ",
            "65": "โชคดีมากในทุกด้าน ผู้ใหญ่ส่งเสริม", "78": "อิทธิพล บารมี มีพวกพ้องมาก",
            "79": "มองการณ์ไกล มีโชคจากสิ่งศักดิ์สิทธิ์", "89": "บารมีสูง มั่งคั่ง มั่นคง"
            // (ระบบจะใช้ความหมายทั่วไปหากไม่มีคู่เลขเฉพาะในนี้)
        };

        const sumDB = {
            36: "พลังมหาเสน่ห์และการเงิน สุขสบายตลอดกาล",
            41: "พลังมหาจักรวาล ความสำเร็จระดับประเทศ",
            42: "พลังแห่งความรักและมิตรภาพ มีโชคลาภเสมอ",
            45: "พลังเทพีแห่งโชคและปัญญา สุดยอดมงคล",
            51: "พลังความสำเร็จที่งดงามและยั่งยืน",
            54: "พลังราชาแห่งความมั่งคั่งและชื่อเสียง",
            55: "พลังความสุขที่สมบูรณ์แบบและสติปัญญา",
            56: "พลังขุมทรัพย์ศฤงคาร ดวงเศรษฐี",
            63: "พลังแห่งความรักที่สมหวังและการเงินพุ่ง",
            65: "พลังคู่ทรัพย์คู่โชค วาสนาดีเยี่ยม"
        };

        function analyzePhone() {
            const rawPhone = document.getElementById('phoneInput').value;
            if (rawPhone.length < 10 || isNaN(rawPhone)) {
                alert("กรุณากรอกเบอร์โทรศัพท์ให้ครบ 10 หลัก");
                return;
            }

            document.getElementById('loading-screen').classList.remove('hidden');
            document.getElementById('loading-screen').classList.add('flex');
            document.getElementById('result-area').classList.add('hidden');

            setTimeout(() => {
                const phone = rawPhone;
                
                // 1. คำนวณผลรวม
                let sum = 0;
                for(let char of phone) sum += parseInt(char);
                document.getElementById('sum-value').innerText = sum;

                // 2. ความหมายผลรวม
                document.getElementById('sum-meaning').innerText = sumDB[sum] ? "มงคลระดับสูง" : "มงคลทั่วไป";
                document.getElementById('sum-desc').innerText = sumDB[sum] || "เป็นผลรวมที่ให้พลังงานที่สมดุล สามารถใช้ชีวิตได้อย่างปกติสุข หากต้องการเพิ่มพลังควรเลือกใช้ผลรวมที่ตกคู่เลขมหาจักรวาล";

                // 3. วิเคราะห์คู่เลข (7 คู่ท้าย)
                const pairContainer = document.getElementById('pair-analysis-grid');
                pairContainer.innerHTML = '';
                let goodPairsCount = 0;
                
                // เริ่มจากหลักที่ 4-10 (เช่น 081-XXX-XXXX)
                for (let i = 3; i < 9; i++) {
                    const pair = phone.substring(i, i + 2);
                    const meaning = pairDB[pair] || "มีความเป็นตัวของตัวเอง มีความสามารถเฉพาะด้าน";
                    const isGood = pairDB[pair] ? true : false;
                    if(isGood) goodPairsCount++;

                    pairContainer.innerHTML += `
                        <div class="bg-white/5 border border-white/10 rounded-xl p-3 flex gap-4 items-center">
                            <div class="text-2xl font-bold text-sky-400 font-mono shrink-0">${pair}</div>
                            <div class="text-[11px] text-slate-300 leading-tight">${meaning}</div>
                        </div>
                    `;
                }

                // 4. ตัดเกรด
                let grade = "C";
                if(sumDB[sum]) {
                    grade = goodPairsCount >= 4 ? "A+" : (goodPairsCount >= 2 ? "A" : "B+");
                } else {
                    grade = goodPairsCount >= 4 ? "B+" : (goodPairsCount >= 2 ? "B" : "C");
                }
                const gradeBadge = document.getElementById('grade-badge');
                gradeBadge.innerText = `เกรด ${grade}`;
                if(grade.includes('A')) gradeBadge.className = "bg-emerald-900/50 text-emerald-400 border border-emerald-500/50 px-5 py-2 rounded-2xl text-2xl font-serif font-extrabold shadow-lg";
                else gradeBadge.className = "bg-sky-900/50 text-sky-400 border border-sky-500/50 px-5 py-2 rounded-2xl text-2xl font-serif font-extrabold shadow-lg";

                // 5. แสดงเบอร์และ Timestamp
                document.getElementById('display-phone').innerText = phone.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
                const now = new Date();
                const userName = localStorage.getItem('user_fullname') || 'ผู้ไขชะตา';
                document.getElementById('timestamp-display').innerText = `รายงานสำหรับคุณ: ${userName} | ออกให้เมื่อ: ${now.toLocaleString('th-TH')}`;

                // จบ
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('loading-screen').classList.remove('flex');
                document.getElementById('result-area').classList.remove('hidden');
                document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });

            }, 1200);
        }

        function downloadImage() {
            const card = document.getElementById('capture-card-phone');
            const btn = document.getElementById('btn-save');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังรวบรวมพลังงาน...';
            btn.disabled = true;

            setTimeout(() => {
                html2canvas(card, {
                    scale: 3,
                    useCORS: true,
                    backgroundColor: '#0B0B1A',
                    logging: false
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `LikitFah_PhoneAnalysis.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                    
                    btn.innerHTML = '<i class="fa-solid fa-check mr-2 text-emerald-400"></i> บันทึกสำเร็จ!';
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    }, 2000);
                });
            }, 100);
        }
    </script>
